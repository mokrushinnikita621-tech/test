{text:"20. С учетом каких параметров следует определять размеры отверстий малых мостов и труб, укрепление подмостовых русел и конусов?", options:["Размеры отверстий малых мостов и труб, укрепление подмостовых русел и конусов следует определять по средним скоростям течения воды, допустимым для грунта русла (в том числе на входе и выходе из сооружения)","Отверстия малых мостов и труб допускается назначать с учетом аккумуляции воды у сооружения","Уменьшение расходов воды в сооружениях вследствие учета аккумуляции возможно не более чем: в 3 раза, если размеры отверстия назначают по ливневому стоку; в 2 раза, если размеры отверстия назначают по снеговому стоку и отсутствуют ледовые и другие явления, уменьшающие размеры отверстия","При наличии вечномерзлых грунтов аккумуляция воды у сооружений не допускается","Уменьшение расходов воды в сооружениях вследствие учета аккумуляции возможно не более чем: в 4 раза, если размеры отверстия назначают по ливневому стоку; в 3 раза, если размеры отверстия назначают по снеговому стоку и отсутствуют ледовые и другие явления, уменьшающие размеры отверстия","При наличии вечномерзлых грунтов аккумуляция воды у сооружений не рекомендуется"], correct:[0,1,2,3]},
{text:"21. Каким образом производится определение расчетных минимальных расходов воды при наличии данных гидрометрических наблюдений достаточной продолжительности?", options:["30-суточные (не календарные) расходы воды используют для расчета минимального стока в случае неустойчивого меженного периода","При значительных расхождениях аналитической кривой и фактических данных в нижней части (резкое отклонение одной-двух последних точек, обусловленное физическими причинами) применяют значения по эмпирическим кривым обеспеченности","При значительных расхождениях аналитической кривой и фактических данных в нижней части (резкое отклонение одной-двух последних точек, обусловленное физическими причинами) применяют значения по аналитическим кривым обеспеченности","Минимальные среднемесячные (календарные) расходы воды рекомендуется использовать в расчетах для верховьев бассейна Волги","Расчет минимального стока ведется на основе минимальных наблюденных расходов воды в не зависимости от сезона когда он был зарегистрирован","Расчет минимального стока ведется отдельно для летней и зимней межени"], correct:[1,3,5]},
{text:"22. В каких случаях следует применять струенаправляющие дамбы?", options:["При пойменном расходе воды не менее 15% расчетного расхода или при средних расчетных скоростях течения воды под мостом до размыва свыше 1 м/с, а также при соответствующих ситуационных особенностях перехода (прижимных течениях, перекрытиях протоков и т.п.)","При пойменном расходе воды не менее 25% расчетного расхода или при средних расчетных скоростях течения воды под мостом до размыва свыше 5 м/с, а также при соответствующих ситуационных особенностях перехода","При пойменном расходе воды не менее 35% расчетного расхода или при средних расчетных скоростях течения воды под мостом до размыва свыше 1,5 м/с, а также при соответствующих ситуационных особенностях перехода","На мостовых переходах при необходимости регулирования направления потока и предотвращения подмывов (размывов) следует предусматривать струенаправляющие и берегоукрепительные сооружения","Для труб и мостов на основании гидравлических расчетов следует предусматривать углубление, планировку и укрепление русел, устройства, препятствующие накоплению наносов, а также устройства для гашения скоростей протекающей воды на входе и выходе","При использовании принципа строительства с сохранением вечной мерзлоты возведение струенаправляющих и берегоукрепительных сооружений допускается вызывать изменения состояния вечномерзлых грунтов в основании, нарушений условий протекания грунтовых вод, местных застоев воды и других значительных изменений бытового режима водотока"], correct:[0,3,4]},
{text:"23. При наличии каких факторов применять трубы не допускается?", options:["Применять трубы не допускается при наличии ледохода и карчехода, и, как правило, в местах возможного возникновения селей и образования наледи","В местах возможного образования наледи в виде исключения может быть допущено применение прямоугольных железобетонных труб (шириной не менее 3 м и высотой не менее 2 м) в комплексе с постоянными противоналедными сооружениями","Боковые стенки трубы должны быть массивными бетонными. Для пропуска селевых потоков следует предусматривать однопролетные мосты отверстиями не менее 4 м или селеспуски с минимальным стеснением потока","Применять трубы не допускается при наличии ледохода и карчехода, и, как правило, в местах возможного возникновения селей и образования наледи. В местах возможного образования наледи в виде исключения может быть допущено применение прямоугольных железобетонных труб (шириной не менее 5 м и высотой не менее 2 м) в комплексе с постоянными противоналедными сооружениями","Применять трубы не допускается при наличии ледохода и карчехода, и, как правило, в местах возможного возникновения селей и образования наледи. В местах возможного образования наледи в виде исключения может быть допущено применение прямоугольных железобетонных труб (шириной не менее 3 м и высотой не менее 4 м) в комплексе с постоянными противоналедными сооружениями","Боковые стенки трубы должны быть массивными бетонными. Для пропуска селевых потоков следует предусматривать двухпролетные мосты отверстиями не менее 4 м или селеспуски с минимальным стеснением потока"], correct:[0,1,2]},
{text:"24. Выберите верное утверждение (возможны несколько вариантов ответа). Каким образом рассчитываются максимальные расходы воды по формуле предельной интенсивности стока?", options:["Учитываются такие морфометрические характеристики бассейна, как площадь бассейна, средневзвешенный уклон бассейна, коэффициент асимметрии склонов, коэффициент извилистости русла","Учитываются такие морфометрические характеристики бассейна, как средний уклон склонов, густота овражно-балочной сетей водосбора","Учитываются такие морфометрические характеристики бассейна, как средняя длина безрусловых склонов водосбора, число скатов склонов водосбора","Учитываются такие морфометрические характеристики бассейна, как заболоченность, залесённость, озёрность, степень оледенения водосбора","Русловое время добегания рассчитывается исходя из гидрографической длины водотока для исследуемой реки и реки-аналога и максимальное значение средней скорости добегания воды по данным реки-аналога","Сборный коэффициент стока рассчитывается исходя из среднего уклона склонов, площади водосбора и типа природной зоны"], correct:[1,2,5]},
{text:"25. С учетом каких факторов производится расчет мостов на воздействие водного потока?", options:["При отсутствии гидрографов и водомерных графиков паводков, а также в других обоснованных случаях, расчет мостов на воздействие водного потока допускается производить по максимальным расходам и соответствующим им уровням расчетных паводков","В расчетах следует учитывать опыт водопропускной работы близко расположенных сооружений на том же водотоке, влияние водопропускных сооружений одно на другое, а также влияние на проектируемый мост существующих или намечаемых к строительству гидротехнических и других речных сооружений","При наличии вблизи мостов инженерных сооружений, зданий и сельскохозяйственных угодий должна обеспечиваться безопасность их от подтопления из-за подпора воды перед мостом","При проектировании мостов, расположенных вблизи некапитальных плотин, необходимо учитывать возможность прорыва этих плотин","Вопрос об усилении таких плотин или увеличении отверстий мостов необходимо решать комплексно путем сравнения технико-экономических показателей возможных вариантов","При отсутствии гидрографов и водомерных графиков паводков, а также в других обоснованных случаях, расчет мостов на воздействие водного потока допускается производить по средним расходам и соответствующим им уровням расчетных паводков"], correct:[0,1,2,3,4]},
{text:"26. Как следует производить расчет мостов, труб и пойменных насыпей на воздействие водного потока?", options:["Расчет мостов, труб и пойменных насыпей на воздействие водного потока следует производить, как правило, по гидрографам и водомерным графикам расчетных паводков","Мосты, трубы и пойменные насыпи на железных дорогах общей сети необходимо рассчитывать по гидрографам и водомерным графикам паводков, условно именуемым наибольшими","При отсутствии гидрографов и водомерных графиков паводков, а также в других обоснованных случаях расчет сооружений на воздействие водного потока допускается производить по максимальным расходам и соответствующим им уровням расчетных и наибольших паводков","При наличии вблизи мостов и труб инженерных сооружений, зданий и сельскохозяйственных угодий необходимо проверить их безопасность от подтопления вследствие подпора воды перед сооружением","Для водопропускных сооружений, расположенных вблизи некапитальных плотин, необходимо учитывать возможность прорыва этих плотин. Вопрос об усилении таких плотин или увеличении отверстий сооружений необходимо решать комплексно путем сравнения технико-экономических показателей возможных решений","В расчетах не рекомендуется учитывать опыт водопропускной работы близкорасположенных сооружений на том же водотоке, взаимное влияние водопропускных сооружений, а также влияние на проектируемые водопропускные сооружения существующих или намечаемых к строительству гидротехнических и других речных сооружений"], correct:[0,1,2,3,4]},
{text:"27. Какие расчетные характеристики селевых потоков должны быть получены в результате инженерных изысканий для обоснования мероприятий и сооружений инженерной защиты объектов капитального строительства для проектной документации?", options:["Расчетные суточные максимумы осадков; максимальные расходы и уровни селевого потока; ширина зоны прохождения селевого потока, скорость движения; максимальный объем выноса за один паводок","Максимальные расходы и уровни селевого потока; ширина зоны прохождения селевого потока, скорость движения; максимальный объем выноса за один паводок; расчетные суточные максимумы осадков","Продолжительность селеопасного периода","Пораженность территории селевыми потоками","Длина селевого русла"], correct:[0]},
{text:"28. Какие виды измерений следует включать в состав гидрологических наблюдений на организуемых постах?", options:["Детальное измерение скоростей течения для характеристики их распределения в створе и в плане участка перехода","Отбор проб донных отложений","Отбор проб почв","Изучение ледового режима на участке перехода","Изучение деформации берегов и дна русла","Измерения температуры, уровней и расходов воды"], correct:[0,1,3,4,5]},
{text:"29. Что входит в состав инженерных изысканий в случаях формирования высоких уровней воды вследствие возникновения заторов и зажоров льда?", options:["Наблюдения за весенним ледоходом","Наблюдения за весенним снегопадом","Наблюдения за осенним ледоходом (при необходимости)","Наблюдения за зимним снегопадом","Наблюдения за осенним ледоходом (обязательно)"], correct:[0,2]},
{text:"30. С учетом каких факторов следует определять число и размеры мостов на пересечении водотока?", options:["Число и размеры мостов на пересечении водотока следует определять на основе результатов инженерных изысканий, гидрологических и гидравлических расчетов","Мосты следует располагать так, чтобы вызванное их строительством и эксплуатацией изменение гидрологических условий не нарушало хозяйственных интересов местного населения, промышленных и других предприятий и организаций","Пропуск вод нескольких водотоков через отверстие одного моста должен быть обоснован, а при наличии селевого стока, лессовых грунтов и возможности образования наледи - не допускается","Мосты следует располагать так, чтобы вызванное их строительством и эксплуатацией изменение гидрологических условий не вызывало необратимых нарушений экологической среды в районе расположения моста","Пропуск вод нескольких водотоков через отверстие одного моста должен быть обоснован, а при наличии селевого стока, лессовых грунтов и возможности образования наледи - допускается при определенных условиях","Пропуск вод нескольких водотоков через отверстие одного моста должен быть обоснован, а при наличии селевого стока, лессовых грунтов и возможности образования наледи - не рекомендуется"], correct:[0,1,2,3]},
{text:"31. Что служит геодезической основой при производстве инженерно-геодезических изысканий на площадках строительства?", options:["Пункты государственных геодезических сетей (плановых и высотных), в том числе пункты спутниковых геодезических определений координат.","Пункты опорной геодезической сети, в том числе геодезических сетей специального назначения для строительства","Пункты геодезической разбивочной основы","Точки (пункты) планово-высотной съемочной геодезической сети (постоянного съемочного обоснования) и фотограмметрического сгущения","Триангуляционные знаки","Прямые, обратные и комбинированные засечки"], correct:[0,1,2,3]},
{text:"32. Когда необходимо выполнять гидрогеологические исследования при инженерно-геологических изысканиях?", options:["В случае проведения инженерных изысканий в неблагоприятный период","В случаях, когда в сфере взаимодействия проектируемого объекта с геологической средой распространены или могут формироваться подземные воды","При решающем влиянии на выбор проектных решений","В районах распространения вечной мерзлоты","При проектировании сооружений на берегах рек и водохранилищ","По дополнительному требованию в техническом задании"], correct:[1,2]},
{text:"33. Какие сведения дополнительно должно содержать задание на выполнение инженерно-геодезических изысканий?", options:["Необходимые для качественной обработки результатов измерений сведения о системе координат и высот","Требования к плотности геодезических пунктов на участке работ и точности определения их планово-высотного положения","Требования к выполнению инженерно-гидрографических работ, включая требования к содержанию инженерно-топографических планов дна водных объектов","Сведения и обоснование методов построения опорной геодезической сети - классах, разрядах","При наличии задания заказчика - данные по формированию инженерной цифровой модели местности","Требования к составу, виду, формату и срокам представления промежуточных материалов и отчетной документации"], correct:[0,2,4,5]},
{text:"34. Что не допускается устанавливать в задании на выполнение инженерных изысканий, за исключением заданий на отдельные виды работ для субподрядных организаций исполнителя?", options:["Идентификационные сведения об объекте (функциональное назначение, уровень ответственности зданий и сооружений)","Состав и объем работ","Необходимость выполнения отдельных видов инженерных изысканий","Методику и технологию выполнения работ","Требования к точности, надежности, достоверности и обеспеченности данных и характеристик, получаемых при инженерных изысканиях","Сроки выполнения инженерных изысканий"], correct:[3]},
{text:"35. Как следует обосновывать значение коэффициента общего размыва под мостом?", options:["Значение коэффициента общего размыва под мостом следует обосновывать технико-экономическим расчетом","Необходимо учитывать возможное уширение русла, скорости течения, допустимые для судоходства и миграции рыбы, а также другие местные условия. Значение коэффициента размыва, как правило, следует принимать не более 2","Для мостов через неглубокие реки и периодические водотоки при соответствующем обосновании допускается принимать коэффициенты общего размыва более 2","При морфометрической основе расчета вычисленные глубины общего размыва следует увеличивать на 15%","Значение коэффициента размыва, как правило, следует принимать не более 3"], correct:[0,1,2,3]},
{text:"36. На какой площади следует проводить инженерно-геологические изыскания для оценки устойчивости склонов?", options:["Для всего протяжения склона","На площади производства работ","Определяется техническим заданием","Для прилегающей к верхней бровке зоны","Только в местах языков выдавливания"], correct:[0,3]},
{text:"37. Какие гидрометеорологические характеристики определяют климатические условия?", options:["Экстремальные и средние значения температуры и влажности воздуха","Наибольшая высота ледового покрова и глубина промерзания почвы, атмосферные явления","Количество и интенсивность атмосферных осадков, скорости ветра","Наибольшая высота снежного покрова и глубина промерзания почвы, атмосферные явления","Количество и интенсивность атмосферных осадков, скорости течения воды"], correct:[0,2,3]},

{text:"80. Направления развития пешеходных мостов при их реконструкции", options:["Применение композитных материалов (углепластиков)","Использование выразительных архитектурных форм","Строительство пешеходных мостов вдоль пересекаемых препятствий","Утяжеление конструкций мостов для обеспечения их устойчивости"], correct:[0,1]},
{text:"81. Какие особенности создания мостов для сейсмоопасных территорий?", options:["Никаких особенностей нет","Запрещено строить мосты в сейсмоопасных регионах","Строят мосты на очень высоких опорах, чтобы как можно дальше отдалить пролетные строения от очага землетрясения","Используют сейсмозащитные приспособления и гасители колебаний"], correct:[3]},

{text:"84. Какие факторы приводят к увеличению срока службы транспортных сооружений?", options:["Неправильное проектирование","Неправильная реализация правильных технических и технологических решений","Неправильная эксплуатация транспортных сооружений","Устранение неблагоприятного воздействия внешней среды"], correct:[3]},
{text:"85. Для повышения устойчивости висячих и вантовых мостов необходимо", options:["При разработке проектов мостов проводить аэродинамические исследования обтекаемости пролетных строений в аэродинамической трубе","Проводить расчетный анализ мостовых сооружений только с использованием сертифицированных конечно-элементных программных комплексов","Подпереть пролетные строения мостов дополнительными опорами, не стесняя при этом русло","Использовать антикоррозионную защиту кабелей и вант"], correct:[0]},

{text:"87. Какими документами вводятся в эксплуатацию временные здания и сооружения, расположенные на строительной площадке или на территории, используемой застройщиком по соглашению с ее владельцем?", options:["Актом государственной приемочной комиссии","Актом рабочей комиссии","Актом лица, осуществляющего строительство","Приказом застройщика (технического заказчика)","Записью в журнале работ лицом, осуществляющим строительство","Ввод в эксплуатацию временного здания или сооружения не оформляется"], correct:[2,4]},
{text:"88. Что включают в себя внутриплощадочные подготовительные работы на строительной площадке?", options:["Срезка растительного слоя по всей территории строительной площадки","Вывоз строительного мусора","Устройство подъездных автомобильных дорог и железнодорожных тупиков","Сдача-приемка геодезической разбивочной основы для строительства","Освобождение строительной площадки для производства строительно-монтажных работ (расчистка территории, снос строений)"], correct:[3,4]},
{text:"89. Что нужно предусматривать при размещении на строительной площадке временной строительной инфраструктуры?", options:["Устройство постоянного электроснабжения","Устройство постоянного водоснабжения","Минимизация объемов временного строительства за счет максимального использования постоянных зданий, дорог и сетей инженерно-технического обеспечения","Оптимизация схем доставки материально-технических ресурсов с минимальным объемом перегрузочных работ","Устройство благоустройства и озеленения","Устройство сетей водоотведения"], correct:[2,3]},

{text:"91. Когда проект производства работ разрабатывается в полном объеме?", options:["При строительстве особо опасных и технически сложных объектов","При строительстве опасных производственных объектов","При строительстве в сложных природных и геологических условиях","При любом строительстве на городской территории"], correct:[2,3]},
{text:"92. Что должен осуществить на объекте подрядчик, осуществляющий строительство, перед началом работ?", options:["Заключает с застройщиком (техническим заказчиком) договор строительного подряда на строительство объекта","Согласовывает состав субподрядных организаций с застройщиком (техническим заказчиком), заключает с ними договоры на выполнение различных видов работ и координирует их деятельность","Заключает с проектировщиком договор на проведение авторского надзора","Заключает договор с уполномоченной организацией о проведении инженерных изысканий","Заключает договор с уполномоченной организацией о проведении государственной экспертизы проектной документации","Заключает договор на разграничение территории строительной площадки","Заключает договоры с аккредитованными лабораториями на выполнение видов испытаний, которые не могут быть выполнены собственными силами","Заключает договоры на поставку материально-технических ресурсов"], correct:[0,1,6,7]},
{text:"93. Что должен осуществить на объекте подрядчик, осуществляющий строительство, перед началом работ?", options:["Принимает площадку для строительства объекта","Производит вынос в натуру осей строительного объекта (геодезическую разбивку)","Составляет акт-допуск о возможном совмещении производства работ при реконструкции объекта капитального строительства","Разрабатывает организационно-технологическую документацию","Получает от застройщика (технического заказчика) организационно-технологическую документацию на весь объект или его часть, на определенные виды работ или разовый объем работ"], correct:[0,2,3]},
{text:"94. Что должен осуществить на объекте подрядчик, осуществляющий строительство, перед началом работ?", options:["Получает от застройщика (технического заказчика) нотариально заверенную копию разрешения на строительство объекта","Получает от застройщика (технического заказчика) оригинал разрешения на строительство объекта","Получает от застройщика (технического заказчика) копию разрешения на строительство объекта","Получает от застройщика (технического заказчика) копию заключения экспертизы проектной документации на строительство объекта","Получает от застройщика (технического заказчика) проектную и рабочую документацию на весь объект или его часть, на определенные виды работ или разовый объем работ"], correct:[0,4]},

{text:"98. С какой целью при инженерно-геологических изысканиях выполняются геофизические исследования?", options:["С целью определения геологического строения массива горных пород","С целью выявления и изучения геологических процессов и их изменений во времени","С целью выявления тектонических нарушений, в том числе активных, зон повышенной трещиноватости и обводненности","С целью определения глубины залегания уровня подземных вод, водоупоров, направления движения потоков подземных вод, а также гидрогеологических параметров грунтов и водоносных горизонтов","С целью сейсмического микрорайонирования территории","С целью проведения мониторинга опасных геологических и инженерно-геологических процессов","С целью определения состава, состояния и свойств грунтов в массиве и их изменений во времени","С целью проведения мониторинга деформаций зданий и сооружений"], correct:[0,1,2,3,4,5,6]},

{text:"100. Что понимается под понятием «карст»?", options:["Комплексный геологический процесс, обусловленный растворением подземными и (или) поверхностными водами горных пород, проявляющийся в их ослаблении, разрушении, образовании пустот и пещер","Комплексный палеонтологический процесс, обусловленный растворением подземными и (или) поверхностными водами горных пород, проявляющийся в их ослаблении, разрушении, образовании пустот и пещер","Изменении напряженного состояния пород, динамики, химического состава и режима подземных и поверхностных вод","В развитии суффозии (механической и химической), эрозий, оседаний, обрушений и пучинистости грунтов","В развитии суффозии (механической и химической), эрозий, оседаний, обрушений и провалов грунтов и земной поверхности"], correct:[0,2,4]},

{text:"102. С учетом каких факторов следует проектировать мосты на селеопасных реках?", options:["Мосты следует, как правило, проектировать однопролетными с перекрытием всей ширины потока и расположением всех элементов моста выше расчетного уровня селя, чтобы свести к минимуму наличие мест возможного воздействия потока на элементы моста","Опоры должны изготавливаться из прочных материалов, способных выдерживать ударное и истирающее воздействие селевого потока","При невозможности проектировать мосты однопролетными с перекрытием всей ширины потока и расположением всех элементов моста выше расчетного уровня селя русловые опоры моста следует проектировать массивной конструкции и придавать их поверхностям, соприкасающимся с селевым потоком, обтекаемые формы, с углами между гранями и динамической осью потока не более 15 градусов"], correct:[0,1,2]},

// ---------- УПРАВЛЕНИЕ ТЕСТОМ ----------
let currentQuestions = [];
let timerInterval = null;
let timeLeft = 900;
let timedMode = false;

const container = document.getElementById('questionsContainer');
const timerDisplay = document.getElementById('timerDisplay');
const infoDiv = document.getElementById('infoMsg');
const checkBtn = document.getElementById('checkBtn');
const resetBtn = document.getElementById('resetBtn');
const scoreDiv = document.getElementById('scorePanel');

function formatTime(sec) { let m = Math.floor(sec/60); let s = sec%60; return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
function stopTimer() { if(timerInterval) clearInterval(timerInterval); timerInterval=null; }
function startTimer(seconds, onEnd) {
    stopTimer();
    timeLeft = seconds;
    timerDisplay.textContent = `⏱️ ${formatTime(timeLeft)}`;
    timerInterval = setInterval(()=>{
        if(timeLeft <= 1) {
            stopTimer();
            timerDisplay.textContent = `⏱️ 00:00`;
            if(onEnd) onEnd();
            alert('⏰ Время вышло! Производится автоматическая проверка.');
            checkAnswers();
        } else {
            timeLeft--;
            timerDisplay.textContent = `⏱️ ${formatTime(timeLeft)}`;
        }
    },1000);
}
function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m=> m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
function render() {
    if(!currentQuestions.length) { container.innerHTML='<div class="info">Нет вопросов. Выберите режим.</div>'; return; }
    let html='';
    currentQuestions.forEach((q,idx)=>{
        const isMult = q.correct.length>1;
        const type = isMult ? 'checkbox' : 'radio';
        const name = isMult ? `cb_${idx}` : `radio_${idx}`;
        html+=`<div class="question-card"><div class="question-text">${idx+1}. ${escapeHtml(q.text)}</div><div class="options-list">`;
        q.options.forEach((opt,optIdx)=>{
            html+=`<div class="option-item"><input type="${type}" name="${name}" value="${optIdx}" id="q${idx}_${optIdx}"><label for="q${idx}_${optIdx}">${escapeHtml(opt)}</label></div>`;
        });
        html+=`</div><div class="result-marker" id="marker_${idx}"></div></div>`;
    });
    container.innerHTML = html;
    scoreDiv.innerHTML = '';
}
function collectAnswers() {
    let res=[];
    for(let i=0;i<currentQuestions.length;i++){
        const q=currentQuestions[i];
        const isMult = q.correct.length>1;
        const name = isMult ? `cb_${i}` : `radio_${i}`;
        let sel=[];
        if(isMult){
            document.querySelectorAll(`input[name="${name}"]:checked`).forEach(cb=>sel.push(parseInt(cb.value)));
        } else {
            let r = document.querySelector(`input[name="${name}"]:checked`);
            if(r) sel.push(parseInt(r.value));
        }
        res.push(sel);
    }
    return res;
}
function checkAnswers() {
    if(!currentQuestions.length) return;
    const answers = collectAnswers();
    let correctCount = 0;
    for(let i=0;i<currentQuestions.length;i++){
        const q = currentQuestions[i];
        const user = answers[i];
        const corr = q.correct;
        const ok = (user.length === corr.length && user.every(v=>corr.includes(v)));
        if(ok) correctCount++;
        const marker = document.getElementById(`marker_${i}`);
        if(marker){
            const correctText = corr.map(idx=>q.options[idx]).join('; ');
            if(ok){
                marker.innerHTML = '✓ Верно';
                marker.className = 'result-marker correct-marker';
            } else {
                marker.innerHTML = `✗ Неверно. Правильный ответ: ${escapeHtml(correctText)}`;
                marker.className = 'result-marker wrong-marker';
            }
        }
    }
    const percent = Math.round((correctCount/currentQuestions.length)*100);
    scoreDiv.innerHTML = `✅ Правильных ответов: ${correctCount} из ${currentQuestions.length} (${percent}%)`;
    if(timedMode) stopTimer();
}
function resetUI() { render(); scoreDiv.innerHTML=''; if(timedMode) startTimer(900,()=>checkAnswers()); }
function setMode(mode) {
    stopTimer();
    timedMode = (mode === 'random25');
    if(mode === 'all'){
        currentQuestions = [...allQuestions];
        render();
        timerDisplay.textContent = '⏱️ 15:00 (таймер неактивен)';
        infoDiv.innerHTML = '📘 Режим: все 126 вопросов (полное соответствие исходнику). Таймер отключён.';
        timedMode = false;
    } else {
        let shuffled = [...allQuestions];
        for(let i=shuffled.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; }
        currentQuestions = shuffled.slice(0,25);
        render();
        timerDisplay.textContent = '⏱️ 15:00';
        startTimer(900,()=>checkAnswers());
        infoDiv.innerHTML = '🎲 25 случайных вопросов. Таймер 15 минут. По истечении – автопроверка.';
    }
    scoreDiv.innerHTML = '';
    document.querySelectorAll('.mode-btn').forEach(btn=>{
        if(btn.dataset.mode === mode) btn.classList.add('active');
        else btn.classList.remove('active');
    });
}
document.querySelectorAll('.mode-btn').forEach(btn=>btn.addEventListener('click',()=>setMode(btn.dataset.mode)));
checkBtn.addEventListener('click',()=>{ checkAnswers(); if(timedMode) stopTimer(); });
resetBtn.addEventListener('click',resetUI);
setMode('all');
</script>
</body>
</html>
