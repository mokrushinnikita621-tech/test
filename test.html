// Управление тестом
let currentQuestions = [];
let timerInterval = null;
let timeLeft = 900;
let timedMode = false;

const container = document.getElementById('questionsContainer');
const timerDisplay = document.getElementById('timerDisplay');
const infoDiv = document.getElementById('infoMsg');
const checkBtn = document.getElementById('checkBtn');
const resetBtn = document.getElementById('resetBtn');
const scoreDiv = document.getElementById('scorePanel');

function formatTime(sec) {
    let m = Math.floor(sec/60);
    let s = sec%60;
    return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}
function stopTimer() {
    if(timerInterval) clearInterval(timerInterval);
    timerInterval = null;
}
function startTimer(seconds, onEnd) {
    stopTimer();
    timeLeft = seconds;
    timerDisplay.textContent = `⏱️ ${formatTime(timeLeft)}`;
    timerInterval = setInterval(() => {
        if(timeLeft <= 1) {
            stopTimer();
            timerDisplay.textContent = `⏱️ 00:00`;
            if(onEnd) onEnd();
            alert('⏰ Время вышло! Автоматическая проверка.');
            checkAnswers();
        } else {
            timeLeft--;
            timerDisplay.textContent = `⏱️ ${formatTime(timeLeft)}`;
        }
    }, 1000);
}
function escapeHtml(s) {
    return s.replace(/[&<>]/g, function(m) {
        if(m==='&') return '&amp;';
        if(m==='<') return '&lt;';
        if(m==='>') return '&gt;';
        return m;
    });
}
function render() {
    if(!currentQuestions.length) { container.innerHTML='<div class="info">Нет вопросов</div>'; return; }
    let html='';
    currentQuestions.forEach((q,i) => {
        const isMult = q.correct.length>1;
        const type = isMult ? 'checkbox' : 'radio';
        const name = isMult ? `cb_${i}` : `radio_${i}`;
        html += `<div class="question-card"><div class="question-text">${i+1}. ${escapeHtml(q.text)}</div><div class="options-list">`;
        q.options.forEach((opt,j) => {
            html += `<div class="option-item"><input type="${type}" name="${name}" value="${j}" id="q${i}_${j}"><label for="q${i}_${j}">${escapeHtml(opt)}</label></div>`;
        });
        html += `</div><div class="result-marker" id="marker_${i}"></div></div>`;
    });
    container.innerHTML = html;
    scoreDiv.innerHTML = '';
}
function collect() {
    let res = [];
    for(let i=0; i<currentQuestions.length; i++) {
        const q = currentQuestions[i];
        const isMult = q.correct.length>1;
        const name = isMult ? `cb_${i}` : `radio_${i}`;
        let sel = [];
        if(isMult) {
            document.querySelectorAll(`input[name="${name}"]:checked`).forEach(cb => sel.push(parseInt(cb.value)));
        } else {
            let r = document.querySelector(`input[name="${name}"]:checked`);
            if(r) sel.push(parseInt(r.value));
        }
        res.push(sel);
    }
    return res;
}
function checkAnswers() {
    if(!currentQuestions.length) return;
    const answers = collect();
    let correctCount = 0;
    for(let i=0; i<currentQuestions.length; i++) {
        const q = currentQuestions[i];
        const user = answers[i];
        const corr = q.correct;
        const ok = (user.length===corr.length && user.every(v=>corr.includes(v)));
        if(ok) correctCount++;
        const marker = document.getElementById(`marker_${i}`);
        if(marker) {
            const correctText = corr.map(idx=>q.options[idx]).join('; ');
            if(ok) {
                marker.innerHTML = '✓ Верно';
                marker.className='result-marker correct-marker';
            } else {
                marker.innerHTML = `✗ Неверно. Правильный ответ: ${escapeHtml(correctText)}`;
                marker.className='result-marker wrong-marker';
            }
        }
    }
    const percent = Math.round((correctCount/currentQuestions.length)*100);
    scoreDiv.innerHTML = `✅ Правильных ответов: ${correctCount} из ${currentQuestions.length} (${percent}%)`;
    if(timedMode) stopTimer();
}
function resetUI() {
    render();
    scoreDiv.innerHTML = '';
    if(timedMode) startTimer(900, ()=>checkAnswers());
}
function setMode(mode) {
    stopTimer();
    timedMode = (mode === 'random25');
    if(mode === 'all') {
        currentQuestions = [...allQuestions];
        render();
        timerDisplay.textContent = '⏱️ 15:00 (неактивен)';
        infoDiv.innerHTML = '📘 Режим: все 126 вопросов. Таймер отключён. Нажмите «Проверить ответы».';
        timedMode = false;
    } else {
        let shuffled = [...allQuestions];
        for(let i=shuffled.length-1; i>0; i--) {
            const j = Math.floor(Math.random()*(i+1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        currentQuestions = shuffled.slice(0,25);
        render();
        timerDisplay.textContent = '⏱️ 15:00';
        startTimer(900, ()=>checkAnswers());
        infoDiv.innerHTML = '🎲 25 случайных вопросов. Таймер 15 минут. По истечении времени – автопроверка.';
    }
    scoreDiv.innerHTML = '';
    document.querySelectorAll('.mode-btn').forEach(btn => {
        if(btn.dataset.mode === mode) btn.classList.add('active');
        else btn.classList.remove('active');
    });
}
document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', ()=>setMode(btn.dataset.mode));
});
checkBtn.addEventListener('click', ()=>{ checkAnswers(); if(timedMode) stopTimer(); });
resetBtn.addEventListener('click', resetUI);
setMode('all');
</script>
